name: PHP Docker CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  docker-build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate PHP syntax
        run: php -l index.php

      - name: Build Docker image
        run: docker build -t dgarcgon/mi-app-php-devops:latest .

      - name: Run container smoke test
        run: |
          docker run -d --name mi-app-php-test -p 8000:8000 dgarcgon/mi-app-php-devops:latest
          sleep 5
          curl -f http://localhost:8000
          docker stop mi-app-php-test

      - name: Login to Docker Hub
        if: github.event_name == 'push'
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Push Docker image
        if: github.event_name == 'push'
        run: docker push dgarcgon/mi-app-php-devops:latest
