name: PHP Docker CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show project files
        run: ls -la

      - name: Validate PHP syntax
        run: php -l index.php

      - name: Build Docker image
        run: docker build -t mi-app-php:test .

      - name: Run container smoke test
        run: |
          docker run -d --name mi-app-php-test -p 8000:8000 mi-app-php:test
          sleep 5
          curl -f http://localhost:8000
          docker stop mi-app-php-test
